spring.application.name=notification-service
server.port=8085

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.exchange=jobportal.exchange
rabbitmq.queue=job.posted.queue
rabbitmq.routing-key=job.posted

auth.service.url=http://auth-service:8081

rabbitmq.applied.queue=job.applied.queue
rabbitmq.applied.routing-key=job.applied

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
version: "3.8"

services:

  # ===============================
  # EUREKA SERVER
  # ===============================
  eureka-server:
    build: ./JPMS-EurekaServer
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - jobportal-network

  # ===============================
  # API GATEWAY
  # ===============================
  api-gateway:
    build: ./JPMS-ApiGateWay
    container_name: api-gateway
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - eureka-server
    networks:
      - jobportal-network

  # ===============================
  # MYSQL DATABASES
  # ===============================
  auth-db:
    image: mysql:8
    container_name: auth-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    networks:
      - jobportal-network

  job-db:
    image: mysql:8
    container_name: job-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: job_db
    ports:
      - "3308:3306"
    networks:
      - jobportal-network

  application-db:
    image: mysql:8
    container_name: application-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: application_db
    ports:
      - "3309:3306"
    networks:
      - jobportal-network

  admin-db:
    image: mysql:8
    container_name: admin-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: admin_db
    ports:
      - "3310:3306"
    networks:
      - jobportal-network

  # ===============================
  # RABBITMQ
  # ===============================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jobportal-network

  # ===============================
  # AUTH SERVICE
  # ===============================
  auth-service:
    build: ./JPMS-AuthService
    container_name: auth-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - auth-db
      - rabbitmq
      - eureka-server
    networks:
      - jobportal-network

  # ===============================
  # JOB SERVICE
  # ===============================
  job-service:
    build: ./JPMS-JobService
    container_name: job-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://job-db:3306/job_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - job-db
      - rabbitmq
      - eureka-server
    networks:
      - jobportal-network

  # ===============================
  # APPLICATION SERVICE
  # ===============================
  application-service:
    build: ./JPMS-ApplicationService
    container_name: application-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://application-db:3306/application_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - application-db
      - rabbitmq
      - eureka-server
    networks:
      - jobportal-network

  # ===============================
  # ADMIN SERVICE
  # ===============================
  admin-service:
    build: ./JPMS-AdminService
    container_name: admin-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://admin-db:3306/admin_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - admin-db
      - eureka-server
      - auth-service
      - job-service
      - application-service
    networks:
      - jobportal-network

  # ===============================
  # NOTIFICATION SERVICE
  # ===============================
  notification-service:
    build: ./JPMS-NotificationService
    container_name: notification-service
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - rabbitmq
      - eureka-server
    networks:
      - jobportal-network

# ===============================
# NETWORK
# ===============================
networks:
  jobportal-network:
    driver: bridge